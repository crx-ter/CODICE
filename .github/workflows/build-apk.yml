name: Build APK — Códice

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Node 22 + Java 17 ─────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Instalar Capacitor + plugins ──────────────────────────────────────
      - name: Instalar Capacitor y plugins
        run: |
          npm install --save-exact \
            @capacitor/core@6.1.2 \
            @capacitor/cli@6.1.2 \
            @capacitor/android@6.1.2 \
            @capacitor/splash-screen@6.0.1 \
            @capacitor/status-bar@6.0.1 \
            @capacitor/keyboard@6.0.2 \
            @capacitor/browser@6.0.0

      # ── 5. Preparar carpeta www ───────────────────────────────────────────────
      - name: Preparar www
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js www/
          for dir in icons js ai core features services ui utils; do
            [ -d "$dir" ] && cp -r "$dir" www/ || echo "⚠ $dir no existe"
          done
          for f in firestore-social.js icon-192.png icon-512.png skills-lock.json; do
            [ -f "$f" ] && cp "$f" www/ || echo "⚠ $f no existe"
          done
          echo "✅ www listo — $(find www -type f | wc -l) archivos"
          ls -la www/

      # ── 6. Agregar plataforma Android ─────────────────────────────────────────
      - name: Agregar plataforma Android
        run: |
          rm -f capacitor.config.ts
          npx cap add android
        env:
          CI: true

      # ── 6b. Sync plugins ─────────────────────────────────────────────────────
      - name: Sync plugins
        run: |
          npx cap sync android

      # ── 7. Permisos en AndroidManifest ───────────────────────────────────────
      - name: Configurar AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q 'INTERNET' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
          grep -q 'RECORD_AUDIO' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application|' "$MANIFEST"
          grep -q 'READ_MEDIA_IMAGES' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\n    <application|' "$MANIFEST"
          grep -q 'READ_EXTERNAL_STORAGE' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <application|' "$MANIFEST"
          sed -i 's|android:theme="@style/AppTheme"|android:theme="@style/AppTheme" android:windowSoftInputMode="adjustResize"|' "$MANIFEST" || true
          echo "✅ AndroidManifest permisos configurados"
          grep "uses-permission" "$MANIFEST"

      # ── 7b. Custom Tabs para Google Sign-In ──────────────────────────────────
      - name: Habilitar Custom Tabs
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 -c "
          import sys
          path = sys.argv[1]
          content = open(path).read()
          if 'customtabs' not in content:
              q = '<queries><intent><action android:name=\"android.support.customtabs.action.CustomTabsService\"/></intent></queries>\n  '
              content = content.replace('<application', q + '<application', 1)
              open(path,'w').write(content)
              print('Custom Tabs agregado')
          else:
              print('Custom Tabs ya presente')
          " "$MANIFEST"

      # ── 8. Tema nativo AppTheme dark ─────────────────────────────────────────
      - name: Tema nativo AppTheme dark
        run: |
          STYLES="android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES" ]; then
            sed -i 's/Theme\.AppCompat\.DayNight\.DarkActionBar/Theme.AppCompat.NoActionBar/g' "$STYLES"
            grep -q 'colorBackground' "$STYLES" || python3 -c "
          content = open('$STYLES').read()
          items = '''    <item name=\"android:colorBackground\">#08080E</item>
          <item name=\"colorPrimary\">#7C8CFF</item>
          <item name=\"colorAccent\">#7C8CFF</item>
          <item name=\"android:windowBackground\">#08080E</item>
          <item name=\"android:statusBarColor\">#08080E</item>
          <item name=\"android:navigationBarColor\">#08080E</item>'''
          content = content.replace('</style>', items + '\n</style>', 1)
          open('$STYLES','w').write(content)
          print('styles.xml actualizado')
          "
            echo "✅ styles.xml OK"
            cat "$STYLES"
          fi
          COLORS="android/app/src/main/res/values/colors.xml"
          if [ ! -f "$COLORS" ]; then
            python3 -c "
          xml = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <resources>
              <color name=\"black\">#08080E</color>
              <color name=\"colorPrimary\">#7C8CFF</color>
              <color name=\"colorAccent\">#7C8CFF</color>
          </resources>'''
          open('$COLORS','w').write(xml)
          print('colors.xml creado')
          "
          fi

      # ── 9. Gradle configuración ───────────────────────────────────────────────
      - name: Configurar Gradle
        run: |
          printf '\nconfigurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22" } }' \
            >> android/app/build.gradle
          sed -i 's/multiDexEnabled false/multiDexEnabled true/' android/app/build.gradle || true
          grep -q 'multiDexEnabled true' android/app/build.gradle || \
            sed -i 's/defaultConfig {/defaultConfig {\n        multiDexEnabled true/' android/app/build.gradle
          mkdir -p android/.gradle
          printf 'org.gradle.jvmargs=-Xmx4g -Xms1g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8\norg.gradle.daemon=false\norg.gradle.parallel=true\norg.gradle.caching=true\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n' >> android/gradle.properties
          echo "✅ Gradle configurado"

      # ── 10. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 11. Build APK debug ───────────────────────────────────────────────────
      - name: Build APK debug
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.logging.level=lifecycle
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      # ── 12. Verificar APK ─────────────────────────────────────────────────────
      - name: Verificar APK
        run: |
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No se encontró ningún APK" && exit 1
          fi
          echo "✅ APK: $APK_PATH ($(du -sh "$APK_PATH" | cut -f1))"

      # ── 13. Renombrar APK ─────────────────────────────────────────────────────
      - name: Renombrar APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          COMMIT=$(echo ${{ github.sha }} | head -c7)
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          NEW_NAME="Codice-${DATE}-${COMMIT}.apk"
          mv "$APK_PATH" "$(dirname "$APK_PATH")/$NEW_NAME"
          echo "APK_NAME=Codice-${DATE}-${COMMIT}" >> $GITHUB_ENV
          echo "APK_PATH=$(dirname "$APK_PATH")/$NEW_NAME" >> $GITHUB_ENV
          echo "✅ $NEW_NAME"

      # ── 14. Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30
          compression-level: 6

      # ── 15. Resumen ───────────────────────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Build Códice" >> $GITHUB_STEP_SUMMARY
          echo "- **APK**: \`${{ env.APK_NAME }}.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Fecha**: $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Descarga desde la sección **Artifacts** de este workflow." >> $GITHUB_STEP_SUMMARY
