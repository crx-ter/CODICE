name: Build APK — Códice

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Node 22 + Java 17 (LTS más estable para Capacitor 6) ─────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK (cmdline-tools) ───────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Instalar Capacitor + plugins (versiones exactas y comprobadas) ────
      - name: Instalar Capacitor y plugins
        run: |
          npm install --save-exact \
            @capacitor/core@6.1.2 \
            @capacitor/cli@6.1.2 \
            @capacitor/android@6.1.2 \
            @capacitor/splash-screen@6.0.1 \
            @capacitor/status-bar@6.0.1 \
            @capacitor/keyboard@6.0.2 \
            @capacitor-community/google-auth@3.4.0
          # @capacitor-community/google-auth implementa Google Sign-In nativo:
          # usa la hoja de cuentas del sistema (igual que Gmail, ChatGPT, etc.)
          # en vez del WebView popup que a veces pide 2FA innecesariamente

      # ── 5. Preparar carpeta www ───────────────────────────────────────────────
      - name: Preparar www
        run: |
          mkdir -p www
          # Archivos raíz principales
          cp index.html manifest.json sw.js www/
          # Carpetas de la app (si existen)
          for dir in icons js ai core features services ui utils; do
            [ -d "$dir" ] && cp -r "$dir" www/ || echo "⚠ $dir no existe, saltando"
          done
          # Archivos sueltos adicionales
          for f in firestore-social.js icon-192.png icon-512.png skills-lock.json; do
            [ -f "$f" ] && cp "$f" www/ || echo "⚠ $f no existe, saltando"
          done
          echo "✅ www listo — $(find www -type f | wc -l) archivos"
          ls -la www/

      # ── 6. Agregar plataforma Android ─────────────────────────────────────────
      - name: Agregar plataforma Android
        run: |
          rm -f capacitor.config.ts
          npx cap add android
          # npx cap sync se llama en paso 6b para incluir GoogleAuth plugin
        env:
          CI: true

      # ── 7. Permisos + tema nativo en AndroidManifest ─────────────────────────
      - name: Configurar AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Internet (siempre necesario para llamadas a Firebase/OpenRouter)
          grep -q 'INTERNET' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
          # Micrófono (para voz/speech recognition)
          grep -q 'RECORD_AUDIO' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application|' "$MANIFEST"
          # Media (para subir imágenes y PDFs)
          grep -q 'READ_MEDIA_IMAGES' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\n    <application|' "$MANIFEST"
          # Storage (Android ≤12 fallback)
          grep -q 'READ_EXTERNAL_STORAGE' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <application|' "$MANIFEST"
          # Ajuste de teclado para no cubrir inputs
          sed -i 's|android:theme="@style/AppTheme"|android:theme="@style/AppTheme" android:windowSoftInputMode="adjustResize"|' "$MANIFEST" || true
          echo "✅ AndroidManifest configurado"
          grep "uses-permission" "$MANIFEST"

      # ── 6b. Inicializar plugin GoogleAuth nativo ─────────────────────────────
      - name: Sync GoogleAuth plugin
        run: |
          # El plugin se sincroniza automáticamente con cap sync
          # Solo verificamos que el plugin está presente
          if [ -d "node_modules/@capacitor-community/google-auth" ]; then
            echo "✅ @capacitor-community/google-auth instalado"
          else
            echo "⚠️ Plugin no encontrado — se instaló en el paso 4"
          fi
          npx cap sync android

      # ── 7b. Habilitar Custom Tabs para Google Sign-In (sin esto popup no funciona) ────
      - name: Habilitar Custom Tabs en AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Custom Tabs — necesario para que signInWithPopup abra ventana nativa
          # Sin esto Google Sign-In abre el navegador del sistema (fuera de la app)
          grep -q 'android.support.customtabs' "$MANIFEST" ||             sed -i 's|<application|<queries>
      <intent>
        <action android:name="android.support.customtabs.action.CustomTabsService"/>
      </intent>
    </queries>
    <application|' "$MANIFEST"
          echo "✅ Custom Tabs habilitado"

      # ── 8. Tema nativo AppTheme (dark, sin barra de título, borde a borde) ─────
      - name: Tema nativo AppTheme dark
        run: |
          STYLES="android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES" ]; then
            # Sin ActionBar ni decoración de sistema visible
            sed -i 's/Theme\.AppCompat\.DayNight\.DarkActionBar/Theme.AppCompat.NoActionBar/g' "$STYLES"
            # Fondo negro profundo, igual que la app — elimina flash blanco al arrancar
            grep -q 'colorBackground' "$STYLES" ||               sed -i 's|</style>|    <item name="android:colorBackground">#08080E</item>
    <item name="colorPrimary">#7C8CFF</item>
    <item name="colorAccent">#7C8CFF</item>
    <item name="android:windowBackground">@color/black</item>
    <item name="android:windowTranslucentStatus">false</item>
    <item name="android:windowDrawsSystemBarBackgrounds">true</item>
    <item name="android:statusBarColor">#08080E</item>
    <item name="android:navigationBarColor">#08080E</item>
</style>|' "$STYLES"
            echo "✅ styles.xml actualizado"
            cat "$STYLES"
          fi
          # Crear colors.xml si no existe (necesario para @color/black)
          COLORS="android/app/src/main/res/values/colors.xml"
          if [ ! -f "$COLORS" ]; then
            cat > "$COLORS" << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="black">#08080E</color>
    <color name="colorPrimary">#7C8CFF</color>
    <color name="colorAccent">#7C8CFF</color>
    <color name="colorBackground">#08080E</color>
</resources>
XML
            echo "✅ colors.xml creado"
          fi

      # ── 9. Gradle: Kotlin + optimizaciones de build ───────────────────────────
      - name: Configurar Gradle
        run: |
          # Forzar versiones Kotlin compatibles con Java 17
          printf '\nconfigurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22" } }' \
            >> android/app/build.gradle

          # Habilitar multiDex (necesario para apps grandes)
          sed -i 's/multiDexEnabled false/multiDexEnabled true/' android/app/build.gradle || true
          grep -q 'multiDexEnabled true' android/app/build.gradle || \
            sed -i 's/defaultConfig {/defaultConfig {\n        multiDexEnabled true/' android/app/build.gradle

          # Propiedades de Gradle optimizadas para CI
          mkdir -p android/.gradle
          cat >> android/gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx4g -Xms1g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

          echo "✅ Gradle configurado"

      # ── 10. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 11. Compilar APK debug firmado ────────────────────────────────────────
      - name: Build APK debug
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.logging.level=lifecycle
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      # ── 12. Verificar APK generado ────────────────────────────────────────────
      - name: Verificar APK
        run: |
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ ERROR: No se encontró ningún APK" && exit 1
          fi
          SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "✅ APK generado: $APK_PATH ($SIZE)"

      # ── 13. Renombrar APK con fecha + commit ──────────────────────────────────
      - name: Renombrar APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          COMMIT=$(echo ${{ github.sha }} | head -c7)
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          APK_DIR=$(dirname "$APK_PATH")
          NEW_NAME="Codice-${DATE}-${COMMIT}.apk"
          mv "$APK_PATH" "$APK_DIR/$NEW_NAME"
          echo "APK_NAME=Codice-${DATE}-${COMMIT}" >> $GITHUB_ENV
          echo "APK_PATH=$APK_DIR/$NEW_NAME" >> $GITHUB_ENV
          echo "✅ APK renombrado: $NEW_NAME"

      # ── 14. Subir artefacto (30 días de retención) ───────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30
          compression-level: 6

      # ── 15. Resumen del build ─────────────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Build Códice" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **APK**: \`${{ env.APK_NAME }}.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Fecha**: $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Descarga el APK desde la sección **Artifacts** de este workflow." >> $GITHUB_STEP_SUMMARY
